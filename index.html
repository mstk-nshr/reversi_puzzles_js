<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reversi Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Reversi Puzzle</h1>
            <div class="filter-panel control-panel consolidated">
                <div class="filter-section horizontal">
                    <span>手番絞り込み:</span>
                    <div class="radio-group">
                        <label><input type="radio" name="turn" value="all" checked> 全て</label>
                        <label><input type="radio" name="turn" value="X"> 黒番</label>
                        <label><input type="radio" name="turn" value="O"> 白番</label>
                    </div>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-section">
                    <div class="empty-cells-header">
                        <span>空きマス数:</span>
                        <button id="select-all-empty" class="btn-text">全選択</button>
                    </div>
                    <div class="checkbox-group">
                        <label><input type="checkbox" class="empty-check" value="2" checked> 2</label>
                        <label><input type="checkbox" class="empty-check" value="3" checked> 3</label>
                        <label><input type="checkbox" class="empty-check" value="4" checked> 4</label>
                        <label><input type="checkbox" class="empty-check" value="5" checked> 5</label>
                        <label><input type="checkbox" class="empty-check" value="6" checked> 6</label>
                        <label><input type="checkbox" class="empty-check" value="7" checked> 7</label>
                        <label><input type="checkbox" class="empty-check" value="8" checked> 8</label>
                    </div>
                </div>
            </div>
        </header>
        
        <main>
            <div class="info-action-bar">
                <p id="puzzle-info">局面を読み込んでいます...</p>
                <div class="action-buttons">
                    <button id="next-button" class="btn-primary" title="別のパズル (N)">&#x23ED;</button>
                    <button id="reset-button" class="btn-secondary" title="始めからやり直す (R)">&#x21BB;</button>
                    <button id="hint-button" class="btn-secondary" title="ヒント (H)">&#x1F4A1;</button>
                </div>
            </div>

            <div id="board-container">
                <div id="board"></div>
            </div>
            
            <div class="controls">
                <div class="stone-counts control-panel">
                    <span id="black-label" class="player-label">You</span>
                    <div class="count-item">
                        <div class="stone black" style="width:30px; height:30px;"></div>
                        <span id="black-count">0</span>
                    </div>
                    <span id="turn-arrow" class="turn-arrow"></span>
                    <div class="count-item">
                        <div class="stone white" style="width:30px; height:30px;"></div>
                        <span id="white-count">0</span>
                    </div>
                    <span id="white-label" class="player-label">---</span>
                </div>
                <div id="turn-display" class="control-panel">
                    <span id="next-turn-msg"></span>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Reversi Puzzle Lab</p>
        </footer>
    </div>
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modal-title">Notification</h2>
            <p id="modal-message"></p>
            <button id="modal-ok-btn" class="primary-button">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

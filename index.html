<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reversi Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Reversi Puzzle</h1>
            <div class="filter-panel control-panel consolidated" id="filter-panel">
                <div id="filter-header" class="filter-header">
                    <span>▼ Filter</span>
                </div>
                <div id="filter-content" class="filter-content hidden">
                    <div id="filter-count" class="filter-count"></div>
                    <div class="filter-section horizontal">
                        <span>Turn filter:</span>
                        <div class="radio-group">
                            <label><input type="radio" name="turn" value="all" checked> all</label>
                            <label><input type="radio" name="turn" value="X"> Black</label>
                            <label><input type="radio" name="turn" value="O"> White</label>
                        </div>
                    </div>
                    <div class="filter-divider"></div>
                    <div class="filter-section">
                        <div class="empty-cells-header">
                            <span>Empty cells:</span>
                            <button id="select-all-empty" class="btn-text">check all</button>
                        </div>
                        <div class="checkbox-group">
                            <label><input type="checkbox" class="empty-check" value="2"> 2</label>
                            <label><input type="checkbox" class="empty-check" value="3" checked> 3</label>
                            <label><input type="checkbox" class="empty-check" value="4" checked> 4</label>
                            <label><input type="checkbox" class="empty-check" value="5" checked> 5</label>
                            <label><input type="checkbox" class="empty-check" value="6"> 6</label>
                            <label><input type="checkbox" class="empty-check" value="7"> 7</label>
                            <label><input type="checkbox" class="empty-check" value="8"> 8</label>
                        </div>
                    </div>
                    <div class="filter-divider"></div>
                    <div class="filter-actions" style="text-align: right; margin-top: 0.25rem;">
                        <button id="close-filter-btn" class="btn-text">▲ Collapse</button>
                    </div>
                </div>
            </div>
        </header>
        
        <main>
            <div class="info-action-bar">
                <p id="puzzle-info">Loading puzzles...</p>
            </div>

            <div id="board-container">
                <div id="board"></div>
            </div>
            
            <div class="controls">
                <div class="stone-counts">
                    <div class="player-info-group control-panel">
                        <span id="black-label" class="player-label">You</span>
                        <div class="count-item">
                            <div class="stone black"></div>
                            <span id="black-count" class="score-number">0</span>
                        </div>
                    </div>
                    <span id="turn-arrow" class="turn-arrow"></span>
                    <div class="player-info-group control-panel">
                        <div class="count-item">
                            <div class="stone white"></div>
                            <span id="white-count" class="score-number">0</span>
                        </div>
                        <span id="white-label" class="player-label">---</span>
                    </div>
                </div>
                <div id="turn-display" class="control-panel">
                    <span id="next-turn-msg"></span>
                </div>
            </div>
            <div class="action-buttons">
                <button id="hint-button" class="btn-secondary" title="Hint (H)">&#x1F4A1;</button>
                <button id="reset-button" class="btn-secondary" title="Restart (R)">&#x21BB;</button>
                <button id="undo-button" class="btn-secondary" title="Undo (U)">&#x21A9;</button>
                <button id="next-button" class="btn-primary" title="Next puzzle (N)">&#x23ED;</button>
                <button id="stats-button" class="btn-secondary" title="Stats (S)">📊</button>
            </div>
        </main>

        <!-- <footer>
            <p>&copy; 2026 MN Puzzle Lab</p>
        </footer> -->
    </div>
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modal-title">Notification</h2>
            <div id="modal-message"></div>
            <div id="modal-actions" style="margin-top:0.75rem; text-align:right;">
                <button id="clear-stats-btn" class="btn-text" style="display:none;">Clear all records</button>
                <button id="clear-zero-fail-btn" class="btn-text" style="display:none;">Clear zero-fail records</button>
                <button id="modal-ok-btn" class="primary-button">OK</button>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reversi Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Reversi Puzzle</h1>
            <p id="puzzle-info">局面を読み込んでいます...</p>
        </header>
        
        <main>
            <div id="board-container">
                <div id="board"></div>
            </div>
            
            <div class="controls">
                <div id="turn-display" class="control-panel">
                    <span>次の手番:</span>
                    <div id="current-player" class="player-indicator"></div>
                </div>
                <button id="next-button" class="btn-primary">別のパズル</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Reversi Puzzle Lab</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
